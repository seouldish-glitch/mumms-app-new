<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Print Asset Labels - MUMMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @media print {
            body { background: white !important; color: black !important; padding: 0 !important; }
            .no-print { display: none !important; }
            .qr-card { border: 1px solid #eee !important; margin: 0 !important; page-break-inside: avoid; }
            .print-grid { grid-template-cols: repeat(4, 1fr) !important; gap: 0 !important; }
            @page { margin: 1cm; }
        }
        .qr-card {
            background: white;
            color: black;
            border-radius: 0.75rem;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }
        .qr-card:hover { transform: scale(1.02); }
    </style>
</head>
<body class="animate-fade bg-bg-dark">

    <div class="container max-w-5xl py-12 space-y-8 no-print">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
            <div class="space-y-2">
                <h2 class="text-4xl font-bold text-white tracking-tight">Asset Labeling</h2>
                <p class="text-slate-400">High-fidelity QR markers for physical inventory management.</p>
            </div>
            <div class="flex gap-4">
                <a href="/inventory" class="glass px-6 py-3 rounded-xl text-[10px] uppercase font-bold tracking-widest text-slate-400 hover:text-white transition-all flex items-center gap-2">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i>
                    Exit
                </a>
                <button onclick="window.print()" class="btn-primary px-8 py-3 text-[10px] uppercase font-bold tracking-[0.2em] shadow-primary/20 flex items-center gap-2">
                    <i data-lucide="printer" class="w-4 h-4"></i>
                    Initialize Print
                </button>
            </div>
        </header>

        <div id="print-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="col-span-full py-24 text-center">
                <div class="w-16 h-16 border-4 border-primary/20 border-t-primary rounded-full animate-spin mx-auto mb-6"></div>
                <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Compiling Asset Manifest...</p>
            </div>
        </div>
    </div>

    <div id="actual-print-grid" class="hidden print:grid print:grid-cols-4 print:gap-4 p-4"></div>

    <script>
        lucide.createIcons();

        const user = JSON.parse(localStorage.getItem('user'));
        if (!user || (user.role !== 'MIC' && user.role !== 'President')) {
            window.location.href = '/home';
        }

        async function loadEquipment() {
            try {
                const res = await fetch('/api/equipment');
                const data = await res.json();
                const grid = document.getElementById('print-grid');
                const printGrid = document.getElementById('actual-print-grid');
                grid.innerHTML = '';
                printGrid.innerHTML = '';

                if (data.success && data.equipment.length > 0) {
                    data.equipment.forEach((item, index) => {
                        const id = item.customId || `ID-${index}`;

                        const card = document.createElement('div');
                        card.className = 'qr-card shadow-2xl';
                        card.innerHTML = `
                            <div class="text-[10px] font-black uppercase tracking-[0.3em] text-primary mb-4">SBC MEDIA</div>
                            <div class="text-xs font-bold text-slate-900 mb-6 text-center line-clamp-1">${item.name}</div>
                            <div id="qr-${id}" class="mb-6 p-2 bg-white rounded-lg"></div>
                            <div class="text-[10px] font-mono font-bold text-slate-400 bg-slate-100 px-3 py-1 rounded-full">${id}</div>
                        `;
                        grid.appendChild(card);

                        const printCard = card.cloneNode(true);
                        printCard.className = 'qr-card border border-slate-200';
                        printGrid.appendChild(printCard);

                        setTimeout(() => {
                            new QRCode(card.querySelector(`#qr-${id}`), {
                                text: id,
                                width: 140,
                                height: 140,
                                colorDark: "#000000",
                                colorLight: "#ffffff",
                                correctLevel: QRCode.CorrectLevel.H
                            });
                            new QRCode(printCard.querySelector(`#qr-${id}`), {
                                text: id,
                                width: 120,
                                height: 120,
                                colorDark: "#000000",
                                colorLight: "#ffffff",
                                correctLevel: QRCode.CorrectLevel.H
                            });
                        }, 50);
                    });
                } else {
                    grid.innerHTML = '<div class="col-span-full py-24 text-center text-slate-500 italic">No assets detected in current manifest.</div>';
                }
            } catch (err) {
                console.error(err);
            }
        }

        loadEquipment();
    </script>
</body>
</html>
